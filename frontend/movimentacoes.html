<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Winona Stock — Movimentações</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="app-page">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#2563EB"/>
          <path d="M10 28L20 12L30 28H10Z" fill="white" fill-opacity="0.9"/>
          <rect x="15" y="22" width="10" height="6" fill="#2563EB"/>
        </svg>
        <span>Winona Stock</span>
      </div>

      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="/produtos.html" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
          Produtos
        </a>
        <a href="/movimentacoes.html" class="nav-item active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
          Movimentações
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">A</div>
          <div class="user-details">
            <span class="user-name" id="userName">Admin</span>
            <span class="user-role" id="userRole">admin</span>
          </div>
        </div>
        <button class="btn-logout" id="logoutBtn" title="Sair">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <!-- CONTEÚDO -->
    <main class="main-content">

      <header class="page-header">
        <div>
          <h1>Movimentações</h1>
          <p>Registe entradas, saídas e ajustes de stock</p>
        </div>
        <button class="btn-primary btn-sm" id="btnNovaMovimentacao">+ Nova Movimentação</button>
      </header>

      <!-- FILTROS -->
      <div class="filters-bar">
        <select id="filterTipo" class="filter-select">
          <option value="">Todos os tipos</option>
          <option value="entrada">Entradas</option>
          <option value="saida">Saídas</option>
          <option value="ajuste">Ajustes</option>
        </select>
        <input type="date" id="filterDataInicio" class="filter-input" style="max-width:180px" />
        <input type="date" id="filterDataFim" class="filter-input" style="max-width:180px" />
        <button class="btn-secondary" id="btnFiltrar">Filtrar</button>
        <button class="btn-secondary" id="btnLimpar">Limpar</button>
      </div>

      <!-- TABELA -->
      <div class="section-card">
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Produto</th>
                <th>UME</th>
                <th>Tipo</th>
                <th>Quantidade</th>
                <th>Custo Unit.</th>
                <th>Utilizador</th>
                <th>Data</th>
                <th>Observação</th>
              </tr>
            </thead>
            <tbody id="movTableBody">
              <tr><td colspan="8" class="table-empty">A carregar...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>

    <!-- MODAL NOVA MOVIMENTAÇÃO -->
    <div class="modal-overlay hidden" id="modalOverlay">
      <div class="modal" style="max-width:480px">
        <div class="modal-header">
          <h3>Nova Movimentação</h3>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body">
          <form id="movForm" novalidate>

            <div class="field-group">
              <label>Produto *</label>
              <select id="fProduto" class="filter-select" style="width:100%">
                <option value="">Seleccione um produto...</option>
              </select>
              <span class="field-error" id="fProdutoError"></span>
            </div>

            <div class="field-group">
              <label>Tipo *</label>
              <select id="fTipo" class="filter-select" style="width:100%">
                <option value="">Seleccione o tipo...</option>
                <option value="entrada">Entrada</option>
                <option value="saida">Saída</option>
                <option value="ajuste">Ajuste</option>
              </select>
              <span class="field-error" id="fTipoError"></span>
            </div>

            <div class="field-group">
              <label id="labelQuantidade">Quantidade *</label>
              <input type="number" id="fQuantidade" placeholder="0" min="1" />
              <span class="field-error" id="fQuantidadeError"></span>
              <span class="field-hint hidden" id="hintAjuste">
                Para ajuste, introduza o valor absoluto do stock actual.
              </span>
            </div>

            <div class="field-group">
              <label>Custo Unitário (Kz)</label>
              <input type="number" id="fCusto" placeholder="0.00" min="0" step="0.01" />
            </div>

            <div class="field-group">
              <label>Observação</label>
              <textarea id="fObservacao" rows="3" placeholder="Opcional..." style="width:100%;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font);font-size:14px;resize:vertical"></textarea>
            </div>

            <div class="modal-actions">
              <button type="button" class="btn-secondary" id="btnCancelar">Cancelar</button>
              <button type="submit" class="btn-primary btn-sm" id="btnSalvar">Registar</button>
            </div>

          </form>
        </div>
      </div>
    </div>

    <script type="module" src="/src/movimentacoes.js"></script>
  </body>
</html>
